version: '3.8'

services:
  bot:
    build: .
    container_name: telegram-contest-bot
    restart: unless-stopped
    volumes:
      - bot-data:/app/data
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CHANNEL_ID=${CHANNEL_ID}
      - CHANNEL_USERNAME=${CHANNEL_USERNAME}
      - ADMIN_ID=${ADMIN_ID}
      - TZ=Asia/Tashkent

volumes:
  bot-data:
